<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - Daily Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 { 
            font-size: 2em;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            color: #00d9ff;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(0,217,255,0.1);
            border-radius: 8px;
            border: 1px solid rgba(0,217,255,0.2);
            transition: background 0.2s;
        }
        .back-link:hover {
            background: rgba(0,217,255,0.2);
        }
        
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 700px) {
            .weather-grid { grid-template-columns: 1fr; }
        }
        
        .city-weather {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .city-weather h3 {
            margin-bottom: 15px;
            font-size: 1.3em;
            color: #00d9ff;
        }
        .city-weather h3 a {
            color: #00d9ff;
            text-decoration: none;
        }
        .city-weather h3 a:hover {
            text-decoration: underline;
        }
        .city-weather .time {
            font-size: 0.7em;
            color: #666;
            font-weight: normal;
        }
        .city-weather .current {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }
        .temp-row {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 15px 0;
        }
        .provider {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .provider-name {
            font-size: 0.85em;
            color: #666;
        }
        .provider .temp {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
        }
        .provider.fmi .temp { color: #00d9ff; }
        .provider.foreca .temp { color: #ffcc00; }
        .feels {
            font-size: 0.9em;
            color: #888;
        }
        
        .hourly-forecast {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.15);
            border-radius: 12px;
        }
        .forecast-subheader {
            width: 100%;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 8px;
        }
        .forecast-hour {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            flex: 1;
            min-width: 60px;
        }
        .forecast-hour .h-time {
            font-size: 0.8em;
            color: #aaa;
            text-decoration: none;
        }
        .forecast-hour .h-time:hover {
            color: #00d9ff;
        }
        .forecast-hour .h-temp {
            font-size: 1em;
        }
        .forecast-hour .h-temp.fmi { color: #00d9ff; }
        .forecast-hour .h-temp.foreca { color: #ffcc00; }
        
        .forecast-header {
            display: flex;
            justify-content: space-around;
            font-size: 0.75em;
            color: #666;
            margin-bottom: 8px;
            padding-left: 50px;
        }
        .forecast-header .provider-label.fmi { color: #00d9ff; }
        .forecast-header .provider-label.foreca { color: #ffcc00; }
        
        .forecast {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .forecast-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex: 1;
        }
        .forecast-day .f-date { font-size: 0.8em; color: #999; }
        .forecast-day .f-temp { font-size: 0.9em; }
        .forecast-day .f-temp.fmi { color: #00d9ff; }
        .forecast-day .f-temp.foreca { color: #ffcc00; }
        
        .timestamp {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Weather - Finland</h1>
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </div>
        
        <div class="weather-grid">
            {{WEATHER}}
        </div>
        
        <p class="timestamp">Last updated: {{TIMESTAMP}} (Europe/Helsinki, {{UTC_OFFSET}})</p>
    </div>
</body>
</html>
